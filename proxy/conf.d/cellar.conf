# CellarStudio: cellarbarberstudio.com

server {
    listen 80;
    server_name cellarbarberstudio.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name cellarbarberstudio.com;

    ssl_certificate /etc/letsencrypt/live/cellarbarberstudio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cellarbarberstudio.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL_CELLAR:10m;
    ssl_session_timeout 10m;

    client_max_body_size 10M;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css text/javascript application/javascript
               application/json application/xml image/svg+xml font/woff2;

    set $cellar_upstream http://cellarstudio-nginx-1:80;

    location / {
        proxy_pass $cellar_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
