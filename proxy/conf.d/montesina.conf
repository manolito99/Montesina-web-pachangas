# Montesiña Padel: pachangasmontesina.cc

server {
    listen 80;
    server_name pachangasmontesina.cc;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name pachangasmontesina.cc;

    ssl_certificate /etc/letsencrypt/live/pachangasmontesina.cc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pachangasmontesina.cc/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL_MONTES:10m;
    ssl_session_timeout 10m;

    client_max_body_size 10M;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css text/javascript application/javascript
               application/json application/xml image/svg+xml font/woff2;

    set $montesina_upstream http://montesina-web-prod:3000;

    # Next.js hashed static assets — immutable cache
    location /_next/static/ {
        proxy_pass $montesina_upstream;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Service worker — must not be cached
    location = /sw.js {
        proxy_pass $montesina_upstream;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
    }

    # Everything else → Next.js
    location / {
        proxy_pass $montesina_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
