services:
  web:
    container_name: montesina-web-prod
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    container_name: montesina-db-prod
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-montesina}
      POSTGRES_USER: ${POSTGRES_USER:-montesina}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Define POSTGRES_PASSWORD in .env}
    volumes:
      - montesina-db-prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-montesina} -d ${POSTGRES_DB:-montesina}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  montesina-db-prod:
